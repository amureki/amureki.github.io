{% extends "base.html" %}

{% block header_description %}{{ page.title }}{% endblock %}

{% block content %}
  <div class="content note-page">
    <div class="note-date">
      <time datetime="{{ page.date }}">{{ page.date }}</time>
    </div>

    <article class="content-prose prose dark:prose-invert">
      {{ page.content | safe }}

      <div class="note-support">
        <p>
          Enjoyed this?
          <a href="/support/">Please consider supporting my work.</a>
        </p>
      </div>
    </article>

    <div class="note-back">
      <a href="{{ get_url(path='@/notes/_index.md') }}">← Back to notes</a>
    </div>
  </div>
{% endblock content %}
